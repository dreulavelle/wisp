# wisp — a request-to-playback engine (Silo + wisp + AIOStreams).
#
#   1. cp .env.example .env    # then edit .env (AIOStreams URL + password required)
#   2. docker compose up -d
#
# wisp writes .strm placeholders into WISP_LIBRARY_PATH and resolves each one to
# a real stream at the moment someone presses play. Those placeholders are
# ordinary small text files, so this needs no FUSE, no privileged capabilities,
# and no mount propagation — just a directory both wisp and the media server can
# see.
#
# Point your media server's library at the same directory. If it runs in its own
# container, a plain read-only bind is enough: there is no mount to propagate,
# so nothing goes stale when wisp restarts.

services:
  wisp:
    image: ghcr.io/dreulavelle/wisp:latest
    container_name: wisp
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data # pin + monitor database (persist this)
      - ${WISP_LIBRARY_PATH:-/library}:${WISP_LIBRARY_PATH:-/library}
    ports:
      - "8080:8080"

  # Your media server — Silo, Plex, Jellyfin, Emby. Usually already running
  # elsewhere; if you run it here, give it the same directory read-only:
  #
  # media-server:
  #   image: your/media-server
  #   volumes:
  #     - ${WISP_LIBRARY_PATH:-/library}:${WISP_LIBRARY_PATH:-/library}:ro
