name: Image

on:
  push:
    branches: [main]      # → edge
    tags: ['v*']          # manual tags → semver + latest
  workflow_dispatch:      # rebuild a released tag on demand (release-please builds live in release-please.yml)
    inputs:
      tag:
        description: "Tag to (re)build, e.g. v0.6.0. Blank = build the current ref as edge."
        required: false
        default: ""

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          # `value=` lets a workflow_dispatch supply the version when github.ref is a branch.
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.tag }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' && github.event.inputs.tag == '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != '' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
