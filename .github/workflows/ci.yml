name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race ./...
      - name: build
        run: CGO_ENABLED=0 go build ./...

      # The dashboard is embedded in the binary as an opaque string, so the Go
      # compiler never looks at it. A syntax error there builds, ships, installs,
      # and only shows up as a blank page in front of an operator.
      - name: dashboard syntax
        run: |
          python3 -c "
          import re, sys
          s = open('internal/plugin/web/index.html').read()
          m = re.search(r'<script>(.*?)</script>', s, re.S)
          sys.exit('no script block found') if not m else open('/tmp/dash.js', 'w').write(m.group(1))
          "
          node --check /tmp/dash.js

      # Cheap, and it catches the one failure class that otherwise only appears
      # at install time: Silo rejects an archive whose manifest checksum does not
      # match its binary, or whose version disagrees with the binary's embedded
      # manifest.
      - name: package
        run: |
          make zip
          python3 - <<'PY'
          import hashlib, json, zipfile
          z = zipfile.ZipFile("dist/silo-plugin-wisp.zip")
          m = json.loads(z.read("manifest.json"))
          assert m["checksum"] == hashlib.sha256(z.read("plugin")).hexdigest(), "checksum mismatch"
          assert m["version"] == json.load(open("cmd/silo-plugin-wisp/manifest.json"))["version"], "version drift"
          print("archive ok:", m["pluginId"], m["version"])
          PY
