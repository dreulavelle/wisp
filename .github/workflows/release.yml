name: release

# Publishes the plugin on a version tag and refreshes the catalog feed.
#
# The tag triggers this, but cmd/silo-plugin-wisp/manifest.json is the source of
# truth for the version. Silo refuses to run a plugin whose embedded manifest
# disagrees with the installed one, so a tag that does not match the manifest
# would publish something uninstallable — this fails instead.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify
        run: |
          test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
          go vet ./...
          go test ./...

      - name: Check the tag matches the manifest
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          manifest="$(python3 -c 'import json;print(json.load(open("cmd/silo-plugin-wisp/manifest.json"))["version"])')"
          [ "$tag" = "$manifest" ] || {
            echo "::error::tag v$tag does not match manifest version $manifest — bump the manifest before tagging"
            exit 1
          }

      - name: Build
        run: make dist zip

      - name: Generate catalog feed
        run: python3 scripts/gen-repository.py "${GITHUB_REF#refs/tags/}"

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" --title "$tag" --generate-notes \
            dist/silo-plugin-wisp-linux-amd64 \
            dist/silo-plugin-wisp-linux-arm64 \
            dist/silo-plugin-wisp.zip \
            dist/checksums.txt \
            repository.json

      # The raw-main URL is what an operator gives Silo, so it has to describe
      # the newest release rather than whatever main last happened to contain.
      - name: Commit the catalog feed to main
        run: |
          set -euo pipefail
          cp repository.json /tmp/repository.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp /tmp/repository.json repository.json
          git diff --quiet -- repository.json && { echo "unchanged"; exit 0; }
          git add repository.json
          git commit -m "chore(release): catalog feed for ${GITHUB_REF#refs/tags/}"
          git push origin main
