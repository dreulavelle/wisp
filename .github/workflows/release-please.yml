name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.rp.outputs.releases_created }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # release-please tags via GITHUB_TOKEN, which cannot trigger another workflow
  # (anti-recursion), so the release artifacts are built here in the same run.
  # A separate tag-triggered workflow would never fire.
  plugin:
    needs: release-please
    if: ${{ needs.release-please.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - id: v
        run: echo "tag=v$(jq -r '.["."]' .release-please-manifest.json)" >> "$GITHUB_OUTPUT"

      # Silo refuses to run a plugin whose embedded manifest disagrees with the
      # installed one, so a release whose manifest version lags the tag would
      # publish something uninstallable.
      - name: Check the manifest matches the release
        run: |
          set -euo pipefail
          manifest="v$(jq -r .version cmd/silo-plugin-wisp/manifest.json)"
          [ "$manifest" = "${{ steps.v.outputs.tag }}" ] || {
            echo "::error::manifest is $manifest but the release is ${{ steps.v.outputs.tag }}"
            exit 1
          }

      - name: Build
        run: make dist zip

      - name: Generate the catalog feed
        run: python3 scripts/gen-repository.py "${{ steps.v.outputs.tag }}"

      # This repo has immutable releases, so assets cannot be attached after
      # publish. release-please therefore creates a draft; artifacts go on while
      # it is still a draft, and publishing is the last step.
      - name: Attach artifacts and publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.v.outputs.tag }}"
          gh release upload "$tag" --clobber \
            dist/silo-plugin-wisp-linux-amd64 \
            dist/silo-plugin-wisp-linux-arm64 \
            dist/silo-plugin-wisp.zip \
            dist/checksums.txt \
            repository.json
          gh release edit "$tag" --draft=false --latest

      # The raw-main URL is what operators give Silo, so it has to describe the
      # release that just shipped.
      - name: Commit the catalog feed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repository.json
          git diff --cached --quiet && { echo "unchanged"; exit 0; }
          # [skip ci] matters more than it looks. Without it this push starts
          # another release-please run, and it lands in the window where the
          # release it is meant to describe has only just stopped being a
          # draft. Finding no published release to anchor on, release-please
          # walks the history to the beginning and proposes a major version
          # built from every breaking change the project has ever had. That
          # phantom PR then has to be recognised and closed by hand after
          # every single release. The commit carries a generated file that no
          # workflow needs to see, so skipping is free.
          git commit -m "chore(release): catalog feed for ${{ steps.v.outputs.tag }} [skip ci]"
          git push origin HEAD:main
