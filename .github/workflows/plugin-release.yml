name: plugin-release

# Publishes the Silo plugin on a version tag: per-arch binaries, an installable
# archive, and a repository.json that Silo's plugin-repository setting can point
# at.
#
# The tag is the trigger, but cmd/silo-plugin-wisp/manifest.json is the source of
# truth for the version. Silo refuses to run a plugin whose embedded manifest
# disagrees with the installed archive, so a tag that does not match the manifest
# would publish something uninstallable — this workflow fails instead.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify
        run: |
          test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
          go vet ./...
          go test ./...

      - name: Check the tag matches the manifest version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/v}"
          manifest="$(python3 -c 'import json;print(json.load(open("cmd/silo-plugin-wisp/manifest.json"))["version"])')"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag v$tag does not match manifest version $manifest."
            echo "Bump cmd/silo-plugin-wisp/manifest.json before tagging — Silo refuses to run a"
            echo "plugin whose embedded manifest disagrees with the installed archive."
            exit 1
          fi
          echo "tag and manifest agree on $manifest"

      - name: Build and package
        run: make dist zip

      - name: Generate repository.json
        run: |
          python3 - <<'PY'
          import hashlib, json, os

          repo = os.environ["GITHUB_REPOSITORY"]
          ref = os.environ.get("GITHUB_REF", "")
          version = json.load(open("cmd/silo-plugin-wisp/manifest.json"))["version"]
          tag = ref.split("/")[-1] if ref.startswith("refs/tags/") else f"v{version}"
          base = f"https://github.com/{repo}/releases/download/{tag}"

          def sha256(path):
              return hashlib.sha256(open(path, "rb").read()).hexdigest()

          manifest = json.load(open("cmd/silo-plugin-wisp/manifest.json"))
          # The catalog manifest carries the archive checksum, matching what the
          # installer verifies on upload.
          manifest["checksum"] = sha256("dist/silo-plugin-wisp-linux-amd64")

          repository = {
              "plugins": [{
                  "manifest": manifest,
                  "artifacts": [
                      {
                          "os": "linux", "arch": arch,
                          "url": f"{base}/silo-plugin-wisp-linux-{arch}",
                          "sha256": sha256(f"dist/silo-plugin-wisp-linux-{arch}"),
                      }
                      for arch in ("amd64", "arm64")
                  ],
                  "archive": {
                      "url": f"{base}/silo-plugin-wisp.zip",
                      "sha256": sha256("dist/silo-plugin-wisp.zip"),
                  },
              }]
          }
          json.dump(repository, open("repository.json", "w"), indent=2)
          open("repository.json", "a").write("\n")
          print("repository.json for", tag)
          PY

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" --title "$tag" --generate-notes \
            dist/silo-plugin-wisp-linux-amd64 \
            dist/silo-plugin-wisp-linux-arm64 \
            dist/silo-plugin-wisp.zip \
            dist/checksums.txt \
            repository.json \
            || gh release upload "$tag" --clobber \
              dist/silo-plugin-wisp-linux-amd64 \
              dist/silo-plugin-wisp-linux-arm64 \
              dist/silo-plugin-wisp.zip \
              dist/checksums.txt \
              repository.json

      # The raw-main URL is what an operator gives Silo's plugin-repository
      # setting, so it has to describe the newest release rather than whatever
      # was current when main last changed.
      - name: Commit repository.json to main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          # Hold the generated file aside: checking out main would overwrite it.
          cp repository.json /tmp/repository.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp /tmp/repository.json repository.json

          if git diff --quiet -- repository.json; then
            echo "repository.json unchanged"
            exit 0
          fi
          git add repository.json
          git commit -m "chore(release): update repository.json for ${GITHUB_REF#refs/tags/}"
          git push origin main
